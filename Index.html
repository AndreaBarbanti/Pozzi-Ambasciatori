<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pozzi Ambasciatori dell'Acqua</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --new:#1565C0; --new-strk:#BBDEFB; --new-soft:#5E92D6;
    --rep:#E65100; --rep-strk:#FFCC80; --rep-soft:#F0883E;
    --bg:#0d1b2a; --panel:rgba(16,30,55,.92); --line:rgba(255,255,255,.12);
    --ink:#e8eef5; --ink-soft:#9db4cc; --accent:#5ec6f0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}

  /* Header */
  #header{
    position:relative;z-index:1100;
    padding:0 22px;height:60px;
    background:linear-gradient(135deg,#0f3a63 0%,#10243f 100%);
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 14px rgba(0,0,0,.45);
    border-bottom:1px solid rgba(94,198,240,.25);
  }
  #header .ttl{display:flex;align-items:center;gap:11px}
  #header .drop{font-size:1.5rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  #header h1{font-size:1.18rem;font-weight:600;letter-spacing:.2px;color:#eaf4ff}
  #header p{font-size:.74rem;color:var(--accent);margin-top:1px;letter-spacing:.4px}
  #print-btn{
    display:flex;align-items:center;gap:7px;
    padding:8px 16px;background:rgba(94,198,240,.14);
    border:1px solid rgba(94,198,240,.5);border-radius:9px;
    color:#eaf4ff;font-size:.83rem;font-weight:600;cursor:pointer;
    white-space:nowrap;transition:all .18s;
  }
  #print-btn:hover{background:rgba(94,198,240,.28);border-color:var(--accent)}

  /* Pannello sfondo (alto dx) */
  #controls{position:absolute;top:74px;right:14px;z-index:1000}
  .ctrl-box{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 13px;backdrop-filter:blur(7px);min-width:172px;
    box-shadow:0 4px 18px rgba(0,0,0,.35);
  }
  .ctrl-box h3{font-size:.66rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:9px}
  .layer-btn{
    display:flex;align-items:center;gap:8px;width:100%;
    padding:7px 11px;margin-bottom:5px;
    border:1px solid var(--line);border-radius:7px;
    background:rgba(255,255,255,.05);color:#cfe0ef;font-size:.8rem;cursor:pointer;
    transition:all .16s;
  }
  .layer-btn:last-child{margin-bottom:0}
  .layer-btn:hover{background:rgba(255,255,255,.13)}
  .layer-btn.active{background:var(--new);border-color:var(--new-soft);color:#fff;font-weight:600}

  /* Card statistiche (alto sx) */
  #stats{
    position:absolute;top:74px;left:14px;z-index:1000;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;backdrop-filter:blur(7px);
    box-shadow:0 4px 18px rgba(0,0,0,.35);display:flex;gap:18px;
  }
  #stats .stat{text-align:center;min-width:54px}
  #stats .num{font-size:1.34rem;font-weight:700;line-height:1;color:#fff}
  #stats .num.acc{color:var(--accent)}
  #stats .lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin-top:5px}

  /* Mappa */
  #map{width:100%;height:calc(100vh - 60px)}

  /* Popup */
  .leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 6px 22px rgba(0,0,0,.3)}
  .leaflet-popup-content{margin:13px 15px}
  .popup-title{font-weight:700;font-size:1.04rem;color:#152a44;margin-bottom:2px}
  .popup-sub{font-size:.77rem;color:#7587a0;margin-bottom:8px}
  .popup-badges{margin-bottom:9px}
  .popup-table{font-size:.8rem;border-collapse:collapse;width:100%}
  .popup-table td{padding:3px 4px;border-top:1px solid #eef1f5}
  .popup-table tr:first-child td{border-top:none}
  .popup-table td:first-child{color:#7587a0;padding-right:12px;white-space:nowrap}
  .popup-table td:last-child{font-weight:600;color:#152a44;text-align:right}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;margin-right:4px}
  .badge-new{background:#E3F2FD;color:#1565C0}
  .badge-rep{background:#FFF3E0;color:#E65100}
  .badge-sch{background:#E8F5E9;color:#2E7D32}
  .badge-vil{background:#F3E5F5;color:#7B1FA2}

  /* Legenda (basso sx) */
  .map-legend{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;backdrop-filter:blur(7px);min-width:200px;color:#cfe0ef;
    font-size:.76rem;line-height:1.4;box-shadow:0 4px 18px rgba(0,0,0,.4);
  }
  .map-legend h4{font-size:.66rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:9px}
  .map-legend .li{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .map-legend .sep{font-size:.6rem;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:10px 0 6px;opacity:.85}
  .map-legend .sz-row{display:flex;align-items:flex-end;gap:6px;margin-top:3px}
  .map-legend .sz-label{font-size:.66rem;color:var(--ink-soft);margin-left:3px;align-self:center}

  /* Stampa */
  @media print{
    @page{size:A4 portrait;margin:6mm}
    html,body{width:198mm;height:285mm;overflow:hidden}
    #controls,#print-btn{display:none!important}
    #header{height:13mm;padding:0 6mm;box-shadow:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #header .drop{font-size:1.2rem}
    #header h1{font-size:11pt}
    #header p{font-size:7pt}
    #stats{display:flex!important;top:16mm;left:4mm;padding:6px 9px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #stats .num{font-size:13pt}
    #map{height:272mm!important;width:198mm!important}
    body{background:#fff}
    .leaflet-control-zoom{display:none!important}
    .leaflet-control-attribution{display:none!important}
  }
  @media (max-width:640px){
    #stats{gap:11px;padding:9px 11px}
    #stats .num{font-size:1.05rem}
    #header h1{font-size:.98rem}
    #print-btn span.txt{display:none}
  }
</style>
</head>
<body>

<div id="header">
  <div class="ttl">
    <span class="drop">💧</span>
    <div>
      <h1>Pozzi Ambasciatori dell'Acqua</h1>

    </div>
  </div>
  <button id="print-btn" onclick="stampaMappa()">🖨 <span class="txt">Salva / Stampa</span></button>

<div id="stats"></div>
<div id="controls">
  <div class="ctrl-box">
    <h3>Sfondo mappa</h3>

/* ---- Statistiche header ---- */
(function(){
  const nNew = pozzi.filter(p=>p.azione==='Nuovo pozzo').length;
  const nRep = pozzi.filter(p=>p.azione!=='Nuovo pozzo').length;
  const nSch = pozzi.filter(p=>p.scuola).length;
  const ben  = pozzi.reduce((a,p)=>a+(p.beneficiari||0),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${pozzi.length}</div><div class="lbl">Pozzi</div></div>
    <div class="stat"><div class="num acc">${ben.toLocaleString('it')}</div><div class="lbl">Beneficiari</div></div>
    <div class="stat"><div class="num">${nSch}</div><div class="lbl">Scuole</div></div>
    <div class="stat"><div class="num">${nNew}/${nRep}</div><div class="lbl">Nuovi/Ripar.</div></div>`;
})();

/* ---- Mappa ---- */
const map = L.map('map',{zoomControl:true}).setView([1.7,33.4],7);
L.control.scale({imperial:false,position:'bottomright'}).addTo(map);

const layers = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
          {attribution:'© OpenStreetMap',maxZoom:18}),
  sat:  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          {attribution:'© Esri, Maxar, Earthstar Geographics',maxZoom:18}),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
          {attribution:'© OpenTopoMap',maxZoom:17}),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
          {attribution:'© CartoDB',maxZoom:19}),
};
layers.sat.addTo(map);

/* ---- Confine Uganda (geoBoundaries ADM0) ---- */
let ugandaLayer=null;
const ugandaStyle={color:'#FFD54F',weight:2.4,opacity:.95,fillColor:'#FFD54F',fillOpacity:.04,dashArray:'1'};
function applyUganda(feature){
  if(ugandaLayer) map.removeLayer(ugandaLayer);
  ugandaLayer=L.geoJSON(feature,{style:ugandaStyle,interactive:false});
  ugandaLayer.addTo(map);
  ugandaLayer.bringToBack();
}
const UGA_URL='https://github.com/wmgeolab/geoBoundaries/raw/9469f09/releaseData/gbOpen/UGA/ADM0/geoBoundaries-UGA-ADM0_simplified.geojson';
fetch(UGA_URL).then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(d=>applyUganda(d.type==='FeatureCollection'?d.features[0]:d))
  .catch(()=>fetch('https://nominatim.openstreetmap.org/search?country=Uganda&polygon_geojson=1&format=geojson&limit=1')
    .then(r=>r.json()).then(d=>{if(d.features&&d.features.length)applyUganda(d.features[0])})
    .catch(()=>console.warn('Confine Uganda non disponibile')));

/* ---- Switcher sfondo ---- */
function switchLayer(name){
  Object.values(layers).forEach(l=>{if(map.hasLayer(l))map.removeLayer(l)});
  layers[name].addTo(map);
  if(ugandaLayer)ugandaLayer.bringToBack();
  document.querySelectorAll('.layer-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+name).classList.add('active');
}
['osm','sat','topo','dark'].forEach(n=>document.getElementById('btn-'+n).addEventListener('click',()=>switchLayer(n)));

/* ---- Dimensione simbolo (proporzionale ai beneficiari) ---- */
function zoomFactor(){return Math.pow(1.32,map.getZoom()-8)}
function markerSize(b){
  const base=(!b||b<400)?19:b<900?23:b<1600?28:34;
  return Math.max(11,Math.round(base*zoomFactor()));
}

/* ---- SVG scuola ---- */
function schoolSVG(s,fill,strk){
  const cx=s/2,m=s*0.07;
  const rTop=m,rBot=m+s*0.36,bTop=rBot-1,bBot=s-m,bH=bBot-bTop;
  const winW=(s-2*m)*0.18,winH=bH*0.32,winY=bTop+bH*0.14;
  const winL=m+(s-2*m)*0.10,winR=s-m-winW-(s-2*m)*0.10;
  const doorW=(s-2*m)*0.22,doorH=bH*0.46,doorX=cx-doorW/2,doorY=bBot-doorH;
  return `<polygon points="${cx},${rTop} ${s-m},${rBot} ${m},${rBot}" fill="${fill}" stroke="${strk}" stroke-width="1.6"/>
    <rect x="${m}" y="${bTop}" width="${s-2*m}" height="${bH}" fill="${fill}" stroke="${strk}" stroke-width="1.6"/>
    <rect x="${winL}" y="${winY}" width="${winW}" height="${winH}" fill="#fff" opacity=".82" rx="1"/>
    <rect x="${winR}" y="${winY}" width="${winW}" height="${winH}" fill="#fff" opacity=".82" rx="1"/>
    <rect x="${doorX}" y="${doorY}" width="${doorW}" height="${doorH}" fill="#fff" opacity=".62" rx="1.5"/>`;
}
/* ---- SVG villaggio (capanna) ---- */
function hutSVG(s,fill,strk){
  const cx=s/2,m=s*0.07;
  const rTop=m,rBot=m+s*0.44,bTop=rBot-2,bBot=s-m,bH=bBot-bTop;
  const doorW=(s-2*m)*0.26,doorH=bH*0.5,doorX=cx-doorW/2,doorY=bBot-doorH;
  return `<rect x="${m}" y="${bTop}" width="${s-2*m}" height="${bH}" fill="${fill}" stroke="${strk}" stroke-width="1.6" rx="2"/>
    <polygon points="${cx},${rTop} ${s-m+1},${rBot} ${m-1},${rBot}" fill="${fill}" stroke="${strk}" stroke-width="1.6"/>
    <line x1="${cx-(cx-m)*0.62}" y1="${rTop+(rBot-rTop)*0.42}" x2="${cx+(cx-m)*0.62}" y2="${rTop+(rBot-rTop)*0.42}" stroke="${strk}" stroke-width=".9" opacity=".6"/>
    <rect x="${doorX}" y="${doorY}" width="${doorW}" height="${doorH}" fill="#fff" opacity=".6" rx="3"/>`;
}

/* ---- Marker ---- */
let markers=[];
function buildMarkers(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  pozzi.forEach(p=>{
    const isNew=p.azione==='Nuovo pozzo';
    const fill=isNew?'#1565C0':'#E65100';
    const strk=isNew?'#BBDEFB':'#FFCC80';
    const s=markerSize(p.beneficiari);
    const inner=p.scuola?schoolSVG(s,fill,strk):hutSVG(s,fill,strk);
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,.55))">${inner}</svg>`;
    const icon=L.divIcon({html:svg,className:'',iconSize:[s,s],iconAnchor:[s/2,s/2],popupAnchor:[0,-s/2-3]});
    const marker=L.marker([p.lat,p.lng],{icon,title:p.nome});

    const bA=`<span class="badge ${isNew?'badge-new':'badge-rep'}">${p.azione}</span>`;
    const bT=`<span class="badge ${p.scuola?'badge-sch':'badge-vil'}">${p.scuola?'🎓 Scuola':'🏘 Villaggio'}</span>`;
    const loc=[p.localita,p.regione].filter(x=>x&&x!=='–').join(', ');
    let rows='';
    if(p.beneficiari) rows+=`<tr><td>Beneficiari totali</td><td>${p.beneficiari.toLocaleString('it')}</td></tr>`;
    if(p.studenti)    rows+=`<tr><td>Studenti</td><td>${p.studenti.toLocaleString('it')}</td></tr>`;
    if(p.prof)        rows+=`<tr><td>Profondità</td><td>${p.prof} m</td></tr>`;
    if(p.portata)     rows+=`<tr><td>Portata stimata</td><td>${p.portata.toLocaleString('it')} l/h</td></tr>`;
    const popup=`<div class="popup-title">${p.nome}</div>
      <div class="popup-sub">${loc?loc+' · ':''}${p.anno}</div>
      <div class="popup-badges">${bA}${bT}</div>
      <table class="popup-table">${rows}</table>`;
    marker.bindPopup(popup,{maxWidth:280});
    marker.addTo(map);markers.push(marker);
  });
}
map.on('zoomend',buildMarkers);
buildMarkers();

/* ---- Legenda (basso sx) ---- */
const legend=L.control({position:'bottomleft'});
legend.onAdd=function(){
  const d=L.DomUtil.create('div','map-legend');
  const ic=(fill,strk,type)=> type==='school'
    ? `<svg width="26" height="26" viewBox="0 0 26 26"><polygon points="13,3 23,11 3,11" fill="${fill}" stroke="${strk}" stroke-width="1.3"/><rect x="4" y="11" width="18" height="11" fill="${fill}" stroke="${strk}" stroke-width="1.3"/><rect x="6.5" y="13.5" width="3.5" height="4" fill="#fff" opacity=".8"/><rect x="16" y="13.5" width="3.5" height="4" fill="#fff" opacity=".8"/><rect x="11" y="17" width="4" height="5" fill="#fff" opacity=".6"/></svg>`
    : `<svg width="26" height="26" viewBox="0 0 26 26"><rect x="5" y="13" width="16" height="9" rx="2" fill="${fill}" stroke="${strk}" stroke-width="1.3"/><polygon points="13,3 23,13 3,13" fill="${fill}" stroke="${strk}" stroke-width="1.3"/><rect x="10" y="17" width="6" height="5" rx="1" fill="#fff" opacity=".6"/></svg>`;
  d.innerHTML=`<h4>Legenda</h4>
    <div class="li">${ic('#1565C0','#BBDEFB','school')} Nuovo pozzo · Scuola</div>
    <div class="li">${ic('#1565C0','#BBDEFB','hut')} Nuovo pozzo · Villaggio</div>
    <div class="li">${ic('#E65100','#FFCC80','school')} Riparazione · Scuola</div>
    <div class="li">${ic('#E65100','#FFCC80','hut')} Riparazione · Villaggio</div>
    <div class="sep">Dimensione = n° beneficiari</div>
    <div class="sz-row">
      <svg width="13" height="13" viewBox="0 0 13 13"><rect x="1.5" y="1.5" width="10" height="10" fill="#90a4b8" stroke="#fff" stroke-width=".9"/></svg>
      <svg width="18" height="18" viewBox="0 0 18 18"><rect x="1.5" y="1.5" width="15" height="15" fill="#90a4b8" stroke="#fff" stroke-width="1"/></svg>
      <svg width="24" height="24" viewBox="0 0 24 24"><rect x="1.5" y="1.5" width="21" height="21" fill="#90a4b8" stroke="#fff" stroke-width="1.1"/></svg>
      <svg width="30" height="30" viewBox="0 0 30 30"><rect x="1.5" y="1.5" width="27" height="27" fill="#90a4b8" stroke="#fff" stroke-width="1.2"/></svg>
      <span class="sz-label">‹ pochi · molti ›</span>
    </div>`;
  L.DomEvent.disableClickPropagation(d);
  return d;
};
legend.addTo(map);

/* ---- Stampa ---- */
function stampaMappa(){
  const ctrl=document.getElementById('controls'),btn=document.getElementById('print-btn'),
        mapEl=document.getElementById('map');
  const origH=mapEl.style.height, origW=mapEl.style.width;
  const center=map.getCenter(), zoom=map.getZoom();
  ctrl.style.display='none';btn.style.display='none';
  // Dimensioni area mappa A4 (96 dpi): 198mm × 272mm
  const mm=px=>Math.round(px/25.4*96);
  mapEl.style.width=mm(198)+'px';
  mapEl.style.height=mm(272)+'px';
  map.invalidateSize();
  map.setView(center,zoom,{animate:false});
  setTimeout(()=>{window.print();
    setTimeout(()=>{ctrl.style.display='';btn.style.display='';
      mapEl.style.height=origH;mapEl.style.width=origW;
      map.invalidateSize();map.setView(center,zoom,{animate:false});},600);
  },500);
}
</script>
